services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: trading_journal
      MYSQL_USER: trading
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change-me-root}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: "Trading Journal API"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:?APP_KEY is required in .env}
      APP_URL: ${APP_URL:-http://localhost}
      LOG_CHANNEL: stack
      LOG_LEVEL: warning
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: database
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: trading_journal
      DB_USERNAME: trading
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api_storage:/var/www/html/storage
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit((int)!@file_get_contents('http://127.0.0.1:8000/up'));\""]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  db_data:
  api_storage:
