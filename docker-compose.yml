services:
  mysql:
    image: mysql:8.4
    container_name: trading-journal-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: trading_journal
      MYSQL_USER: trading
      MYSQL_PASSWORD: veasna123
      MYSQL_ROOT_PASSWORD: veasna123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -pveasna123"]
      interval: 10s
      timeout: 5s
      retries: 10

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: trading-journal-php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - composer_cache:/tmp/composer-cache
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: trading_journal
      DB_USERNAME: trading
      DB_PASSWORD: veasna123
      COMPOSER_CACHE_DIR: /tmp/composer-cache
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -lc "composer install --no-interaction --prefer-dist --ignore-platform-req=ext-curl && php-fpm"

  node:
    image: node:20-alpine
    container_name: trading-journal-node
    restart: unless-stopped
    working_dir: /app
    environment:
      VITE_PROXY_TARGET: http://nginx
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

  nginx:
    image: nginx:1.25-alpine
    container_name: trading-journal-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - node

volumes:
  mysql_data:
  node_modules:
  composer_cache:
